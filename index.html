<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>DVD Screensaver</title>
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#000000" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <canvas id="screen"></canvas>

  <div id="controls" class="controls hidden" aria-hidden="true">
    <div class="controls__row">
      <label for="speed">Speed</label>
      <input id="speed" type="range" min="0.5" max="3" step="0.1" value="1" />
    </div>
    <div class="controls__row">
      <label for="size">Logo size</label>
      <input id="size" type="range" min="5" max="35" step="1" value="30" />
    </div>
    <div class="controls__row">
      <label for="angle">Angle</label>
      <input id="angle" type="range" min="15" max="75" step="1" value="45" />
    </div>
    <div class="controls__row controls__buttons">
      <button id="install" class="btn btn--primary" type="button">Add to Home Screen</button>
      <button id="mode" class="btn btn--secondary" type="button" aria-pressed="false">Night</button>
    </div>
  </div>

  <div id="installModal" class="modal hidden" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="modal__card" id="installCard">
      <div class="modal__title">Add to Home Screen</div>
      <div class="modal__body" id="installText"></div>
      <div class="modal__hint">Tap anywhere to close</div>
      <button id="installClose" class="btn btn--primary" type="button">Close</button>
    </div>
  </div>

  <script src="app.js"></script>
</body>
</html>
